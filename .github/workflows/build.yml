name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Windows: PyInstaller single .exe ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install imageio-ffmpeg pyinstaller pillow

      - name: Build
        run: pyinstaller --clean --noconfirm specops.spec

      - name: Package
        shell: cmd
        run: copy "dist\ClipReview.exe" "SPEC-OPS-Clip-Review-win.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: SPEC-OPS-Clip-Review-win.exe

  # ── macOS: shell-script .app bundle inside DMG ────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build DMG
        run: bash build-mac.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: ClipReview-mac.dmg

  # ── Publish: update the rolling "latest" GitHub Release ───────────────────
  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Publish to GitHub Releases (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build"
          body: "Auto-built from the latest commit on main."
          prerelease: false
          files: |
            SPEC-OPS-Clip-Review-win.exe
            ClipReview-mac.dmg
